<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cutiedevu · Developer</title>
<link rel="icon" href="pfp2.jpg" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg: #08080c;
  --fg: #f0f0f5;
  --muted: rgba(240,240,245,0.5);
  --accent: #ff3eb5;
  --accent-secondary: #0368745b;
  --card: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.08);
  --glow-pink: rgba(255,62,181,0.6);
  --glow-cyan: rgba(0,229,255,0.5);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  color: var(--fg);
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  overflow-x: hidden;
  cursor: none;
}

/* ========== PROFESSIONAL PRELOADER ========== */
.preloader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 99999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s cubic-bezier(0.65, 0, 0.35, 1), visibility 0.8s ease;
  overflow: hidden;
}

.preloader.loaded {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.preloader-inner {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 30px;
}

/* Circular Progress Container */
.progress-container {
  position: relative;
  width: 140px;
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.progress-svg {
  position: absolute;
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.progress-bg {
  fill: none;
  stroke: rgba(255, 255, 255, 0.05);
  stroke-width: 2;
}

.progress-ring {
  fill: none;
  stroke: url(#gradient);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 283;
  stroke-dashoffset: 283;
  transition: stroke-dashoffset 0.1s ease-out;
  filter: drop-shadow(0 0 8px var(--glow-pink));
}

/* Central Content */
.progress-content {
  position: relative;
  z-index: 2;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.progress-percent {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--fg);
  letter-spacing: -1px;
}

.progress-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--accent);
  opacity: 0.8;
}

/* Glitch Text Container */
.glitch-text-container {
  text-align: center;
  height: 40px;
  overflow: hidden;
}

.preloader-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 24px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--fg);
  position: relative;
}

/* Scramble Text Animation */
.char {
  display: inline-block;
  animation: charPop 0.4s ease forwards;
  opacity: 0;
  transform: translateY(10px);
}

@keyframes charPop {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Loading Bar (Minimal) */
.minimal-bar {
  width: 100px;
  height: 2px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}

.minimal-bar::after {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--glow-cyan));
  border-radius: 2px;
  transition: width 0.2s ease;
}

/* Exit Animation for Preloader */
.preloader.loaded .progress-container {
  animation: exitPulse 0.6s ease-out forwards;
}

@keyframes exitPulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.1); opacity: 0.8; }
  100% { transform: scale(0.8); opacity: 0; }
}

.preloader.loaded .preloader-title {
  animation: fadeDown 0.5s ease-out forwards;
}

@keyframes fadeDown {
  to {
    opacity: 0;
    transform: translateY(-20px);
  }
}

/* Custom Cursor */
.cursor {
  width: 20px;
  height: 20px;
  border: 2px solid var(--accent);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.15s ease, background 0.2s ease;
  transform: translate(-50%, -50%);
}

.cursor-dot {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
}

.cursor.hover {
  transform: translate(-50%, -50%) scale(1.8);
  background: rgba(255,62,181,0.2);
  border-color: var(--accent-secondary);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { 
  background: linear-gradient(180deg, var(--accent), var(--accent-secondary));
  border-radius: 3px;
}

/* Canvas Background */
#particles-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* Background Video */
.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  filter: blur(8px) brightness(0.25) saturate(0.8);
  z-index: -2;
  transform: scale(1.1);
}

/* Animated Gradient Overlay */
.gradient-overlay {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,62,181,0.15), transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,229,255,0.1), transparent);
  z-index: -1;
  animation: gradientShift 15s ease-in-out infinite alternate;
}

@keyframes gradientShift {
  0% { opacity: 0.8; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.1); }
}

/* Animated Mesh Grid */
.mesh-grid {
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
  animation: gridMove 20s linear infinite;
  pointer-events: none;
}

@keyframes gridMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(60px, 60px); }
}

/* Floating Orbs */
.orbs-container {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  animation: orbFloat 25s ease-in-out infinite;
}

.orb-1 {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, var(--glow-pink) 0%, transparent 70%);
  top: -150px;
  right: -100px;
  animation-delay: 0s;
}

.orb-2 {
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, var(--glow-cyan) 0%, transparent 70%);
  bottom: -100px;
  left: -100px;
  animation-delay: -8s;
}

.orb-3 {
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(138,43,226,0.4) 0%, transparent 70%);
  top: 40%;
  left: 30%;
  animation-delay: -16s;
}

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
  25% { transform: translate(50px, -40px) scale(1.1) rotate(5deg); }
  50% { transform: translate(-30px, 50px) scale(0.9) rotate(-5deg); }
  75% { transform: translate(40px, 30px) scale(1.05) rotate(3deg); }
}

/* Mouse Glow Follower */
.mouse-glow {
  position: fixed;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255,62,181,0.15) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  transform: translate(-50%, -50%);
  transition: opacity 0.3s ease;
}

/* Clock Widget */
.clock-widget {
  position: fixed;
  top: 24px;
  left: 24px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  padding: 12px 20px;
  border-radius: 16px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 2px;
  transition: all 0.3s ease;
  font-family: 'Space Grotesk', sans-serif;
  cursor: none;
}

.clock-widget:hover {
  border-color: var(--accent);
  box-shadow: 0 0 30px rgba(255,62,181,0.2);
  transform: translateY(-2px);
}

.clock-time {
  font-size: 24px;
  font-weight: 600;
  color: var(--fg);
  letter-spacing: 1px;
  display: flex;
  align-items: baseline;
  gap: 4px;
}

.clock-seconds {
  font-size: 14px;
  color: var(--accent);
  font-weight: 500;
}

.clock-date {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Sound Button */
#sound-btn {
  position: fixed;
  top: 24px;
  right: 24px;
  padding: 12px 24px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 50px;
  color: var(--fg);
  font-size: 13px;
  font-weight: 500;
  cursor: none;
  z-index: 100;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: 0.5px;
}

#sound-btn:hover {
  background: rgba(255,62,181,0.15);
  border-color: var(--accent);
  box-shadow: 0 0 30px rgba(255,62,181,0.3);
  transform: translateY(-2px);
}

#sound-btn svg {
  width: 18px;
  height: 18px;
}

/* Main Container */
.main-container {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

/* Profile Card */
.card {
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(40px);
  border: 1px solid var(--border);
  padding: 50px 45px;
  border-radius: 32px;
  text-align: center;
  width: 100%;
  max-width: 380px;
  position: relative;
  overflow: hidden;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.8;
}

.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(255,62,181,0.1) 0%, transparent 50%);
  pointer-events: none;
}

.card:hover {
  transform: translateY(-8px);
  border-color: rgba(255,62,181,0.3);
  box-shadow: 
    0 25px 80px rgba(255,62,181,0.2),
    0 0 60px rgba(0,229,255,0.1);
}

/* Animated Border */
.card-border {
  position: absolute;
  inset: -2px;
  border-radius: 34px;
  background: linear-gradient(45deg, var(--accent), var(--accent-secondary), var(--accent));
  background-size: 400% 400%;
  z-index: -1;
  opacity: 0;
  transition: opacity 0.4s ease;
  animation: borderRotate 4s linear infinite;
}

.card:hover .card-border {
  opacity: 0.6;
}

@keyframes borderRotate {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Avatar */
.avatar-wrapper {
  position: relative;
  display: inline-block;
  margin-bottom: 28px;
  cursor: none;
}

.avatar-wrapper::before {
  content: '';
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  border: 2px solid rgba(255, 0, 157, 0.3);
  opacity: 0;
  z-index: 0;
  animation: sonarPulse 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}

@keyframes sonarPulse {
  0% {
    transform: scale(0.85);
    opacity: 0.8;
    border-color: var(--accent-secondary);
  }
  100% {
    transform: scale(1.4);
    opacity: 0;
    border-color: var(--accent);
  }
}

.avatar-ring-secondary {
  position: absolute;
  inset: -14px;
  border-radius: 50%;
  border: 2px dashed rgba(255,255,255,0.15);
  animation: ringRotateReverse 30s linear infinite;
  z-index: 1;
}

@keyframes ringRotateReverse {
  to { transform: rotate(-360deg); }
}

.avatar-ring {
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, var(--accent), var(--accent-secondary), var(--accent));
  animation: ringRotate 8s linear infinite;
  z-index: 2;
  opacity: 0.9;
}

@keyframes ringRotate {
  to { transform: rotate(360deg); }
}

.avatar-ring::before {
  content: '';
  position: absolute;
  inset: 3px;
  background: var(--bg);
  border-radius: 50%;
}

.avatar {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center;
  display: block;
  position: relative;
  z-index: 3;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), filter 0.5s ease;
  filter: brightness(1) saturate(1);
}

.avatar:hover {
  transform: scale(1.08);
  filter: brightness(1.1) saturate(1.1);
}

.status-badge {
  position: absolute;
  bottom: 5px;
  right: 5px;
  width: 28px;
  height: 28px;
  background: var(--bg);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
  border: 2px solid rgba(255,255,255,0.1);
}

.status-dot {
  width: 12px;
  height: 12px;
  background: #22c55e;
  border-radius: 50%;
  animation: statusPulse 2s ease-in-out infinite;
  box-shadow: 0 0 10px rgba(34,197,94,0.6);
}

@keyframes statusPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(0.85); opacity: 0.7; }
}

/* Title */
.card h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--fg);
  margin-bottom: 6px;
  letter-spacing: -0.5px;
  position: relative;
}

/* Typing Effect */
.typing-text {
  font-size: 14px;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 16px;
  min-height: 20px;
  font-family: 'Space Grotesk', monospace;
}

.typing-text::after {
  content: '|';
  animation: blink 1s infinite;
  margin-left: 2px;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Bio */
.bio {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.8;
  max-width: 280px;
  margin: 0 auto;
}

/* Divider */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 28px 0;
}

/* Social Links */
.socials {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
}

.socials a {
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  text-decoration: none;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  color: var(--muted);
  font-size: 20px;
  position: relative;
  overflow: hidden;
}

.socials a::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.socials a:hover {
  transform: translateY(-6px) scale(1.05);
  border-color: transparent;
  color: white;
  box-shadow: 0 15px 40px rgba(255,62,181,0.3);
}

.socials a:hover::before {
  opacity: 1;
}

.socials a i {
  position: relative;
  z-index: 1;
}

/* Analytics Widget */
.analytics-widget {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 100;
}

.analytics-card {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  padding: 12px 18px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.3s ease;
  cursor: none;
}

.analytics-card:hover {
  border-color: var(--accent);
  box-shadow: 0 0 30px rgba(255,62,181,0.2);
  transform: translateY(-2px);
}

.analytics-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  background: rgba(255,62,181,0.15);
  color: var(--accent);
}

.analytics-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.analytics-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--fg);
  font-family: 'Space Grotesk', sans-serif;
}

.analytics-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Admin Hint */
.admin-hint {
  position: fixed;
  bottom: 24px;
  left: 24px;
  font-size: 12px;
  color: var(--muted);
  opacity: 0.4;
  z-index: 10;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Toast */
.toast-container {
  position: fixed;
  bottom: 100px;
  right: 24px;
  z-index: 1001;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.toast {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  padding: 16px 24px;
  border-radius: 16px;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  transform: translateX(120%);
  opacity: 0;
  animation: toastSlideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

.toast.success {
  border-color: rgba(34,197,94,0.5);
  background: rgba(34,197,94,0.1);
}

@keyframes toastSlideIn {
  to { transform: translateX(0); opacity: 1; }
}

.toast-out {
  animation: toastSlideOut 0.4s ease-out forwards;
}

@keyframes toastSlideOut {
  to { transform: translateX(120%); opacity: 0; }
}

/* Entrance Animations */
.card {
  opacity: 0;
  transform: translateY(40px) scale(0.95);
  animation: cardEntrance 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
}

@keyframes cardEntrance {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.stagger-in > * {
  opacity: 0;
  transform: translateY(20px);
  animation: staggerFadeIn 0.6s ease-out forwards;
}

.stagger-in > *:nth-child(1) { animation-delay: 0.5s; }
.stagger-in > *:nth-child(2) { animation-delay: 0.6s; }
.stagger-in > *:nth-child(3) { animation-delay: 0.7s; }
.stagger-in > *:nth-child(4) { animation-delay: 0.8s; }
.stagger-in > *:nth-child(5) { animation-delay: 0.9s; }
.stagger-in > *:nth-child(6) { animation-delay: 1.0s; }
.stagger-in > *:nth-child(7) { animation-delay: 1.1s; }

@keyframes staggerFadeIn {
  to { opacity: 1; transform: translateY(0); }
}

/* Floating Elements */
.floating-element {
  position: fixed;
  pointer-events: none;
  z-index: 5;
  opacity: 0.5;
  animation: float 6s ease-in-out infinite;
}

.floating-element svg {
  width: 20px;
  height: 20px;
  stroke: var(--accent);
  fill: none;
  stroke-width: 1.5;
}

.fe-1 { top: 15%; left: 10%; animation-delay: 0s; }
.fe-2 { top: 25%; right: 15%; animation-delay: -2s; }
.fe-3 { bottom: 30%; left: 8%; animation-delay: -4s; }
.fe-4 { top: 60%; right: 8%; animation-delay: -1s; }
.fe-5 { bottom: 15%; right: 25%; animation-delay: -3s; }

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(10deg); }
}

/* Discord Status Styles */
.discord-status {
  margin: 15px 0;
  padding: 15px;
  background: rgba(255, 255, 255, 0.03);
  border-radius: 16px;
  border: 1px solid var(--border);
}

.status-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  color: #5865F2;
  font-size: 14px;
  font-weight: 600;
  justify-content: center;
}

.presence-container {
  min-height: 60px;
}

.presence-item {
  display: flex;
  align-items: center;

<script>
// ========== INITIALIZATION GUARD ==========
// All variables initialized at the top before any functions
const preloader = document.getElementById('preloader');
const progressCircle = document.getElementById('progress-circle');
const progressPercent = document.getElementById('progress-percent');
const preloaderTitle = document.getElementById('preloader-title');
const minimalBar = document.getElementById('minimal-bar');
const cursor = document.getElementById('cursor');
const cursorDot = document.getElementById('cursor-dot');
const mouseGlow = document.getElementById('mouse-glow');
const video = document.getElementById('bg-video');
const soundBtn = document.getElementById('sound-btn');
const mobileSoundToggle = document.getElementById('mobile-sound-toggle');
const toastContainer = document.getElementById('toast-container');
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');

let mouseX = 0;
let mouseY = 0;
let cursorX = 0;
let cursorY = 0;
let glowX = 0;
let glowY = 0;
let particles = [];
const particleCount = 60;
let isSoundOn = false;
let preloaderLoaded = false;

// Circle circumference for SVG progress
const radius = 45;
const circumference = 2 * Math.PI * radius;

// ========== PRELOADER SYSTEM ==========
function initPreloader() {
  // Set initial circle styles
  progressCircle.style.strokeDasharray = circumference;
  progressCircle.style.strokeDashoffset = circumference;
  
  const targetText = "CUTIEDEVU";
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*";
  const duration = 2000; // Total animation time
  const frameRate = 30;
  const totalFrames = Math.round(duration / (1000 / frameRate));
  
  let frame = 0;
  let progress = 0;
  
  // Scramble Text Animation
  const scrambleInterval = setInterval(() => {
    frame++;
    // Calculate progress
    progress = Math.min(100, (frame / totalFrames) * 100 * 1.5); // Speed up slightly
    
    // Update circular progress
    const offset = circumference - (progress / 100) * circumference;
    progressCircle.style.strokeDashoffset = offset;
    
    // Update percent text
    progressPercent.textContent = Math.floor(progress) + '%';
    
    // Update minimal bar
    minimalBar.style.width = progress + '%';
    
    // Update scramble text
    let currentText = "";
    for (let i = 0; i < targetText.length; i++) {
      // If progress covers this character, reveal it
      if (i < (progress / 100) * targetText.length) {
        currentText += targetText[i];
      } else {
        // Otherwise show random char
        currentText += chars[Math.floor(Math.random() * chars.length)];
      }
    }
    preloaderTitle.textContent = currentText;
    
    // Completion
    if (progress >= 100) {
      clearInterval(scrambleInterval);
      preloaderTitle.textContent = targetText;
      progressPercent.textContent = "100%";
      
      // Trigger exit animation
      setTimeout(() => {
        preloader.classList.add('loaded');
        preloaderLoaded = true;
        document.body.style.overflow = 'auto';
      }, 500);
    }
  }, 1000 / frameRate);
}

// ========== ANALYTICS SYSTEM ==========
const ANALYTICS_KEY = 'cutiedevu_analytics';

function initAnalytics() {
  const stored = localStorage.getItem(ANALYTICS_KEY);
  let analytics = stored ? JSON.parse(stored) : {
    totalViews: 0,
    lastVisit: null,
    visitorId: null
  };
  
  // Generate unique visitor ID if not exists
  if (!analytics.visitorId) {
    analytics.visitorId = 'visitor_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  }
  
  // Update analytics
  analytics.totalViews++;
  analytics.lastVisit = Date.now();
  
  // Save to localStorage
  localStorage.setItem(ANALYTICS_KEY, JSON.stringify(analytics));
  
  // Update UI with animation
  setTimeout(() => {
    animateCounter('total-views', analytics.totalViews);
  }, 2500);
}

function animateCounter(elementId, targetValue) {
  const element = document.getElementById(elementId);
  if (!element) return;
  
  const duration = 1500;
  const startValue = 0;
  const startTime = performance.now();
  
  function update(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    
    // Easing function
    const easeOut = 1 - Math.pow(1 - progress, 3);
    const currentValue = Math.floor(startValue + (targetValue - startValue) * easeOut);
    
    element.textContent = formatNumber(currentValue);
    
    if (progress < 1) {
      requestAnimationFrame(update);
    }
  }
  
  requestAnimationFrame(update);
}

function formatNumber(num) {
  if (num >= 1000000) {
    return (num / 1000000).toFixed(1) + 'M';
  } else if (num >= 1000) {
    return (num / 1000).toFixed(1) + 'K';
  }
  return num.toString();
}

// ========== CUSTOM CURSOR ==========
document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function animateCursor() {
  if (!preloaderLoaded) {
    requestAnimationFrame(animateCursor);
    return;
  }
  
  const ease = 0.15;
  const glowEase = 0.08;
  
  cursorX += (mouseX - cursorX) * ease;
  cursorY += (mouseY - cursorY) * ease;
  glowX += (mouseX - glowX) * glowEase;
  glowY += (mouseY - glowY) * glowEase;
  
  if (cursor && cursorDot) {
    cursor.style.left = cursorX + 'px';
    cursor.style.top = cursorY + 'px';
    cursorDot.style.left = mouseX + 'px';
    cursorDot.style.top = mouseY + 'px';
  }
  
  if (mouseGlow) {
    mouseGlow.style.left = glowX + 'px';
    mouseGlow.style.top = glowY + 'px';
  }
  
  requestAnimationFrame(animateCursor);
}

// Cursor hover effect
document.querySelectorAll('a, button, .socials a, .avatar-wrapper, .clock-widget, .analytics-card').forEach(el => {
  el.addEventListener('mouseenter', () => {
    if (cursor) cursor.classList.add('hover');
  });
  el.addEventListener('mouseleave', () => {
    if (cursor) cursor.classList.remove('hover');
  });
});

// ========== PARTICLES ==========
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() {
    this.reset();
  }
  
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.max(0.5, Math.random() * 2 + 0.5);
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.speedY = (Math.random() - 0.5) * 0.5;
    this.opacity = Math.max(0.1, Math.random() * 0.5 + 0.2);
    this.hue = Math.random() > 0.5 ? 320 : 185;
  }
  
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.reset();
    }
  }
  
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, Math.max(0.1, this.size), 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.opacity})`;
    ctx.fill();
  }
}

for (let i = 0; i < particleCount; i++) {
  particles.push(new Particle());
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  
  // Draw connections
  particles.forEach((p1, i) => {
    particles.slice(i + 1).forEach(p2 => {
      const dx = p1.x - p2.x;
      const dy = p1.y - p2.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < 150) {
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = `rgba(255, 62, 181, ${0.1 * (1 - dist / 150)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    });
  });
  
  requestAnimationFrame(animateParticles);
}

// ========== TYPING EFFECT ==========
const typingTexts = ['Web Developer', 'Gamer', 'Creative Mind', 'Friendly Relationships Keeper'];
const typingElement = document.getElementById('typing-text');
let textIndex = 0;
let charIndex = 0;
let isDeleting = false;

function typeText() {
  if (!typingElement) return;
  
  const currentText = typingTexts[textIndex];
  
  if (isDeleting) {
    typingElement.textContent = currentText.substring(0, charIndex - 1);
    charIndex--;
  } else {
    typingElement.textContent = currentText.substring(0, charIndex + 1);
    charIndex++;
  }
  
  let delay = isDeleting ? 50 : 100;
  
  if (!isDeleting && charIndex === currentText.length) {
    delay = 2000;
    isDeleting = true;
  } else if (isDeleting && charIndex === 0) {
    isDeleting = false;
    textIndex = (textIndex + 1) % typingTexts.length;
    delay = 500;
  }
  
  setTimeout(typeText, delay);
}

// ========== SOUND TOGGLE ==========
function toggleSound() {
  isSoundOn = !isSoundOn;
  
  if (video) {
    video.muted = !isSoundOn;
  }
  
  // Update desktop button
  if (soundBtn) {
    if (isSoundOn) {
      soundBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 5L6 9H2v6h4l5 4V5z"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
        <span>Sound On</span>
      `;
    } else {
      soundBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 5L6 9H2v6h4l5 4V5z"/>
          <line x1="23" y1="9" x2="17" y2="15"/>
          <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
        <span>Sound Off</span>
      `;
    }
  }
  
  // Update mobile toggle
  if (mobileSoundToggle) {
    if (isSoundOn) {
      mobileSoundToggle.classList.add('active');
      mobileSoundToggle.innerHTML = '<i class="fas fa-volume-up"></i>';
    } else {
      mobileSoundToggle.classList.remove('active');
      mobileSoundToggle.innerHTML = '<i class="fas fa-volume-mute"></i>';
    }
  }
  
  showToast(isSoundOn ? 'Sound enabled' : 'Sound muted', 'success');
}

if (soundBtn) {
  soundBtn.addEventListener('click', toggleSound);
}

if (mobileSoundToggle) {
  mobileSoundToggle.addEventListener('click', toggleSound);
}

// ========== TOAST SYSTEM ==========
function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    <span>${message}</span>
  `;
  toastContainer.appendChild(toast);
  
  setTimeout(() => {
    toast.classList.add('toast-out');
    setTimeout(() => toast.remove(), 400);
  }, 2500);
}

// ========== CLOCK ==========
function updateClock() {
  const now = new Date();
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  const seconds = String(now.getSeconds()).padStart(2, '0');
  
  const timeEl = document.getElementById('clock-time');
  const dateEl = document.getElementById('clock-date');
  
  if (timeEl) {
    timeEl.innerHTML = `${hours}:${minutes}<span class="clock-seconds">${seconds}</span>`;
  }
  
  if (dateEl) {
    const options = { weekday: 'short', month: 'short', day: 'numeric' };
    dateEl.textContent = now.toLocaleDateString('en-US', options);
  }
}

// ========== DISCORD STATUS ==========
const DISCORD_USER_ID = '1419682706572316682';

async function fetchDiscordStatus() {
  const presenceElement = document.getElementById('discord-presence');
  if (!presenceElement) return;
  
  try {
    const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_USER_ID}`);
    const data = await response.json();
    
    if (data.success && data.data) {
      updatePresenceUI(data.data);
    } else {
      showPresenceError('User not tracked', 'Join Lanyard Discord server to enable tracking');
    }
  } catch (error) {
    console.error('Lanyard API error:', error);
    showPresenceError('Connection error', 'Unable to fetch Discord status');
  }
}

function updatePresenceUI(data) {
  const presenceElement = document.getElementById('discord-presence');
  if (!presenceElement) return;
  
  const { discord_status, activities, discord_user, spotify } = data;
  
  const avatarUrl = discord_user.avatar 
    ? `https://cdn.discordapp.com/avatars/${DISCORD_USER_ID}/${discord_user.avatar}.png?size=64`
    : `https://cdn.discordapp.com/embed/avatars/${discord_user.discriminator % 5}.png`;

  let activityHtml = '';
  let statusClass = discord_status;
  let imgHtml = `<img class="presence-avatar" src="${avatarUrl}" alt="Avatar">`;

  if (spotify) {
    statusClass = 'listening';
    imgHtml = `<img class="presence-avatar" src="${spotify.album_art_url}" alt="Album Art" style="border-radius: 6px;">`;
    
    activityHtml = `
      <div class="presence-name" style="color: #1DB954;">
        Listening to Spotify
      </div>
      <div class="presence-activity">
        <span style="font-weight: 600; color: var(--fg);">${escapeHtml(spotify.song)}</span>
        <span>by ${escapeHtml(spotify.artist)}</span>
        <span>on ${escapeHtml(spotify.album)}</span>
      </div>
    `;
  } else {
    const gameActivity = activities.find(a => a.type === 0);
    const streamActivity = activities.find(a => a.type === 1);
    const customStatus = activities.find(a => a.type === 4);

    const getTimeElapsed = (start) => {
      if (!start) return '';
      const elapsed = Math.floor((Date.now() - start) / 60000);
      if (elapsed < 1) return 'Just started';
      if (elapsed === 1) return '1 minute ago';
      if (elapsed < 60) return `${elapsed} minutes elapsed`;
      const hours = Math.floor(elapsed / 60);
      const mins = elapsed % 60;
      return `${hours}h ${mins}m elapsed`;
    };

    if (gameActivity) {
      const timeString = getTimeElapsed(gameActivity.timestamps?.start);
      
      activityHtml = `
        <div class="presence-name">
          ${escapeHtml(discord_user.global_name || discord_user.username)}
          <span class="presence-status-dot ${discord_status}"></span>
        </div>
        <div class="presence-activity">
          <span>Playing <strong style="color: var(--fg);">${escapeHtml(gameActivity.name)}</strong></span>
          ${gameActivity.details ? `<span>${escapeHtml(gameActivity.details)}</span>` : ''}
          ${gameActivity.state ? `<span>${escapeHtml(gameActivity.state)}</span>` : ''}
          ${timeString ? `<span class="presence-timestamp">${timeString}</span>` : ''}
        </div>
      `;
    } else if (streamActivity) {
       activityHtml = `
        <div class="presence-name">
          ${escapeHtml(discord_user.global_name || discord_user.username)}
          <span class="presence-status-dot ${discord_status}"></span>
        </div>
        <div class="presence-activity">
          <span style="color: #5936c5;">Streaming <strong>${escapeHtml(streamActivity.name)}</strong></span>
          ${streamActivity.details ? `<span>${escapeHtml(streamActivity.details)}</span>` : ''}
        </div>
      `;
    } else if (customStatus) {
      activityHtml = `
        <div class="presence-name">
          ${escapeHtml(discord_user.global_name || discord_user.username)}
          <span class="presence-status-dot ${discord_status}"></span>
        </div>
        <div class="presence-activity">
          <span>${customStatus.emoji ? escapeHtml(customStatus.emoji.name) + ' ' : ''}${escapeHtml(customStatus.state || 'Custom Status')}</span>
        </div>
      `;
    } else {
      const statusText = {
        'online': 'Online',
        'idle': 'Idle',
        'dnd': 'Do Not Disturb',
        'offline': 'Offline'
      };
      activityHtml = `
        <div class="presence-name">
          ${escapeHtml(discord_user.global_name || discord_user.username)}
          <span class="presence-status-dot ${discord_status}"></span>
        </div>
        <div class="presence-activity">
          <span>${statusText[discord_status] || 'Offline'}</span>
        </div>
      `;
    }
  }

  presenceElement.innerHTML = `
    <div class="presence-item ${statusClass}">
      ${imgHtml}
      <div class="presence-details">
        ${activityHtml}
      </div>
    </div>
  `;
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showPresenceError(message, hint) {
  const presenceElement = document.getElementById('discord-presence');
  if (!presenceElement) return;
  
  presenceElement.innerHTML = `
    <div class="presence-error">
      <span>${message}</span>
      <small>${hint || ''}</small>
    </div>
  `;
}

// ========== INITIALIZATION ==========
document.addEventListener('DOMContentLoaded', () => {
  // Start preloader
  initPreloader();
  
  // Initialize analytics
  initAnalytics();
  
  // Start animations
  animateCursor();
  animateParticles();
  
  // Start clock
  updateClock();
  setInterval(updateClock, 1000);
  
  // Start typing effect
  setTimeout(typeText, 2500);
  
  // Fetch Discord status
  fetchDiscordStatus();
  setInterval(fetchDiscordStatus, 30000);
});
</script>
